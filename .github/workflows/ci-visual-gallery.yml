name: CI Visual Gallery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request:
    types: [closed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  # Commit status on the PR head SHA so branch protection can require
  # "CI Visual Gallery / OS compare" even though this workflow is workflow_run-driven.
  statuses: write

concurrency:
  group: ci-visual-gallery-${{ github.event.workflow_run.id || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish PR gallery
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      contains(fromJSON('["success", "failure"]'), github.event.workflow_run.conclusion)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let prNumber = 0;
            if (run.pull_requests && run.pull_requests.length > 0) {
              prNumber = run.pull_requests[0].number;
            } else {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: run.head_sha,
              });
              const openPr = prs.find((pr) => pr.state === 'open') || prs[0];
              if (openPr) prNumber = openPr.number;
            }
            if (!prNumber) {
              core.setFailed('Unable to resolve PR number for visual gallery publish');
              return;
            }
            const pagesBase = 'https://fritz-fritz.github.io/easel-ci-visual';
            const runUrl = `${run.html_url}`;
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('sha', run.head_sha);
            core.setOutput('run_id', String(run.id));
            core.setOutput('run_url', runUrl);
            core.setOutput('pages_base', pagesBase);
            core.info(`PR #${prNumber} sha=${run.head_sha}`);

      # Skip empty galleries: no Pages publish, no sticky "no artifacts" comment.
      # Still post a success commit status so a required "OS compare" check is not left pending.
      - name: Check for CI visual artifacts
        id: visuals
        uses: actions/github-script@v7
        with:
          script: |
            const runId = Number('${{ steps.meta.outputs.run_id }}');
            const sha = '${{ steps.meta.outputs.sha }}';
            const runUrl = '${{ steps.meta.outputs.run_url }}';
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const visual = (data.artifacts || []).filter(
              (a) =>
                !a.expired &&
                (a.name.endsWith('.png') || a.name.startsWith('ci-visual-manifest-')),
            );
            core.setOutput('count', String(visual.length));
            if (visual.length === 0) {
              core.info(
                `No CI visual artifacts on run ${runId}; skipping gallery publish`,
              );
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'CI Visual Gallery / OS compare',
                description: 'no visual artifacts on CI run',
                target_url: runUrl,
              });
            } else {
              core.info(`Found ${visual.length} CI visual artifact(s) on run ${runId}`);
            }

      # workflow_run is a privileged context (secrets + write tokens). Never check out
      # the PR head SHA here — that would execute untrusted code with those privileges.
      # Gallery tooling always comes from the default branch; keep build_gallery.py
      # backward-compatible with older ci-visual manifests.
      - name: Check out default branch (trusted gallery tooling)
        if: steps.visuals.outputs.count != '0'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      # ci-visual uploads with upload-artifact@v7 archive:false (raw PNG/JSON).
      # Those require download-artifact@v8; v7 tries to unzip them and fails after retries.
      - name: Download CI visual artifacts
        if: steps.visuals.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.meta.outputs.run_id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/ci-visual-artifacts
          merge-multiple: true

      - name: Detect deploy credentials
        if: steps.visuals.outputs.count != '0'
        id: deploy
        env:
          EASEL_CI_VISUAL_TOKEN: ${{ secrets.EASEL_CI_VISUAL_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${EASEL_CI_VISUAL_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EASEL_CI_VISUAL_TOKEN is not configured; posting comment without Pages image embeds"
          fi

      - name: Build HTML gallery and PR comment
        if: steps.visuals.outputs.count != '0'
        id: gallery
        run: |
          set -euo pipefail
          mkdir -p "${{ runner.temp }}/ci-visual-artifacts"
          # Always emit site/comment even when strict OS compare fails; the gate
          # is enforced via commit status + final step so reviewers still get embeds.
          python3 .github/ci-visual/build_gallery.py \
            --artifacts "${{ runner.temp }}/ci-visual-artifacts" \
            --out "${{ runner.temp }}/ci-visual-gallery" \
            --pr-number "${{ steps.meta.outputs.pr_number }}" \
            --sha "${{ steps.meta.outputs.sha }}" \
            --run-url "${{ steps.meta.outputs.run_url }}" \
            --run-id "${{ steps.meta.outputs.run_id }}" \
            --pages-base "${{ steps.meta.outputs.pages_base }}" \
            --no-fail-on-os-mismatch \
            $([[ "${{ steps.deploy.outputs.enabled }}" == "true" ]] && echo --deployed || echo --no-deployed)
          SUMMARY_JSON="${{ runner.temp }}/ci-visual-gallery/summary.json"
          python3 - "$SUMMARY_JSON" <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import sys
          from pathlib import Path
          summary = json.loads(Path(sys.argv[1]).read_text())
          cmp = summary.get("comparison", {})
          print(f"gate_ok={'true' if cmp.get('gate_ok', True) else 'false'}")
          print(f"strict_failed={cmp.get('strict_failed', 0)}")
          print(f"strict_total={cmp.get('strict_total', 0)}")
          print(f"strict_match={cmp.get('strict_match', 0)}")
          print(f"strict_warnings={cmp.get('strict_warnings', 0)}")
          print(f"image_count={summary.get('image_count', 0)}")
          PY

      - name: Publish gallery to easel-ci-visual Pages repo
        if: steps.visuals.outputs.count != '0' && steps.deploy.outputs.enabled == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.EASEL_CI_VISUAL_TOKEN }}
          external_repository: fritz-fritz/easel-ci-visual
          publish_branch: gh-pages
          publish_dir: ${{ runner.temp }}/ci-visual-gallery/site
          destination_dir: pr/${{ steps.meta.outputs.pr_number }}
          keep_files: true
          allow_empty_commit: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "gallery: update PR #${{ steps.meta.outputs.pr_number }} (${{ steps.meta.outputs.sha }})"

      # Sticky comment embeds use raw.githubusercontent.com (see build_gallery.py) so camo
      # does not race GitHub Pages CDN. Still wait briefly for the push to be readable.
      - name: Wait for raw gallery assets
        if: steps.visuals.outputs.count != '0' && steps.deploy.outputs.enabled == 'true'
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          SHA: ${{ steps.meta.outputs.sha }}
          SITE_DIR: ${{ runner.temp }}/ci-visual-gallery/site
        run: |
          set -euo pipefail
          sample="$(find "$SITE_DIR" -maxdepth 1 -type f -name '*.png' | sort | head -1 || true)"
          if [[ -z "$sample" ]]; then
            echo "::warning::No PNGs in gallery site; skipping raw-asset wait"
            exit 0
          fi
          name="$(basename "$sample")"
          short="$(printf '%s' "$SHA" | tr -cd '0-9a-fA-F' | cut -c1-12)"
          url="https://raw.githubusercontent.com/fritz-fritz/easel-ci-visual/gh-pages/pr/${PR_NUMBER}/${name}?v=${short}"
          for attempt in $(seq 1 30); do
            code="$(curl -sS -o /dev/null -w '%{http_code}' -A 'easel-ci-visual-gallery' "$url" || echo 000)"
            if [[ "$code" == "200" ]]; then
              echo "Raw gallery asset ready after ${attempt} attempt(s): $url"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::Raw gallery asset not ready after wait; sticky embeds may 404 until GitHub propagates ($url)"

      - name: Upsert sticky PR comment
        if: steps.visuals.outputs.count != '0'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.meta.outputs.pr_number }}
          header: easel-ci-visual
          path: ${{ runner.temp }}/ci-visual-gallery/comment.md

      - name: Publish commit status for branch protection
        if: always() && steps.visuals.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          GALLERY_CONCLUSION: ${{ steps.gallery.conclusion }}
          GATE_OK: ${{ steps.gallery.outputs.gate_ok }}
          STRICT_FAILED: ${{ steps.gallery.outputs.strict_failed }}
          STRICT_TOTAL: ${{ steps.gallery.outputs.strict_total }}
          STRICT_MATCH: ${{ steps.gallery.outputs.strict_match }}
          STRICT_WARNINGS: ${{ steps.gallery.outputs.strict_warnings }}
          PAGES_BASE: ${{ steps.meta.outputs.pages_base }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          SHA: ${{ steps.meta.outputs.sha }}
          RUN_URL: ${{ steps.meta.outputs.run_url }}
          DEPLOYED: ${{ steps.deploy.outputs.enabled }}
        with:
          script: |
            const galleryConclusion = process.env.GALLERY_CONCLUSION || '';
            const gateOk = process.env.GATE_OK === 'true';
            const failed = Number(process.env.STRICT_FAILED || '0');
            const total = Number(process.env.STRICT_TOTAL || '0');
            const matched = Number(process.env.STRICT_MATCH || '0');
            const warnings = Number(process.env.STRICT_WARNINGS || '0');
            const deployed = process.env.DEPLOYED === 'true';
            const galleryUrl = deployed
              ? `${process.env.PAGES_BASE.replace(/\/$/, '')}/pr/${process.env.PR_NUMBER}/`
              : process.env.RUN_URL;
            let state;
            let description;
            if (galleryConclusion !== 'success') {
              state = 'failure';
              description = 'gallery build failed';
            } else if (!gateOk) {
              state = 'failure';
              description = `apply-payload OS mismatch: ${failed}/${total} asset(s)`;
            } else if (total === 0) {
              state = 'success';
              description = 'no strict-stage assets to compare';
            } else if (warnings > 0) {
              state = 'success';
              description =
                `apply-payload gate ok (${matched}/${total} full match, ${warnings} incomplete)`;
            } else {
              state = 'success';
              description = `apply-payload identical across OS (${matched} asset(s))`;
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SHA,
              state,
              context: 'CI Visual Gallery / OS compare',
              description: description.slice(0, 140),
              target_url: galleryUrl,
            });
            core.info(`Posted commit status ${state}: ${description}`);

      - name: Upload built gallery from this job
        if: always() && steps.visuals.outputs.count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: ci-visual-gallery-pr-${{ steps.meta.outputs.pr_number }}
          path: ${{ runner.temp }}/ci-visual-gallery
          retention-days: 7

      - name: Fail on strict cross-OS regressions
        if: >-
          steps.visuals.outputs.count != '0' &&
          steps.gallery.conclusion == 'success' &&
          steps.gallery.outputs.gate_ok != 'true'
        run: |
          echo "::error::Strict-stage visual assets differ across OS (see sticky comment / HTML gallery)."
          exit 1

  cleanup:
    name: Remove closed PR gallery
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Detect deploy credentials
        id: deploy
        env:
          EASEL_CI_VISUAL_TOKEN: ${{ secrets.EASEL_CI_VISUAL_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${EASEL_CI_VISUAL_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No EASEL_CI_VISUAL_TOKEN; nothing to clean up"
          fi

      - name: Delete pr/${{ github.event.pull_request.number }} from assets repo
        if: steps.deploy.outputs.enabled == 'true'
        env:
          EASEL_CI_VISUAL_TOKEN: ${{ secrets.EASEL_CI_VISUAL_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${EASEL_CI_VISUAL_TOKEN}@github.com/fritz-fritz/easel-ci-visual.git" \
            "$work"
          cd "$work"
          if [[ ! -d "pr/${PR_NUMBER}" ]]; then
            echo "No gallery directory for PR #${PR_NUMBER}"
            exit 0
          fi
          rm -rf "pr/${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "gallery: remove PR #${PR_NUMBER}" || exit 0
          git push
