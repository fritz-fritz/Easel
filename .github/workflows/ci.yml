name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: Test with visual apply-payload artifacts
        env:
          WALLSPAN_VISUAL_OUTDIR: ${{ runner.temp }}/wallspan-visual
        run: cargo test
      - name: Upload raster visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-payload-${{ matrix.os }}
          path: ${{ runner.temp }}/wallspan-visual/*.png
          if-no-files-found: ignore
      - name: Summarize visual artifacts
        if: always()
        shell: bash
        run: |
          {
            echo "## Apply-payload rasters (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-visual" 2>/dev/null || echo "_No visual files_"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: cargo clippy --all-targets -- -D warnings

  desktop:
    name: Qt desktop smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_name: gui-linux.png
          - os: windows-latest
            gui_name: gui-windows.png
          - os: macos-latest
            gui_name: gui-osx.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential clang cmake ninja-build pkg-config g++ \
            qt6-base-dev qt6-declarative-dev xvfb \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-dialogs qml6-module-qtqml \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick-templates

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          # Full desktop install already includes Qt Declarative / Quick.
          # Do not pass `qtdeclarative` as `modules` — that is an archive name.
          version: "6.6.3"
          arch: win64_msvc2019_64
          cache: true
          install-deps: "true"

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo build -p wallspan-desktop

      - name: Build desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build -p wallspan-desktop

      - name: Clippy desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Clippy desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Smoke screenshot (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
          CXX: g++
          CC: gcc
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          xvfb-run -a cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/wallspan-gui" | Out-Null
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Upload GUI smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-smoke-${{ matrix.os }}
          path: ${{ runner.temp }}/wallspan-gui/*.png
          if-no-files-found: warn

      - name: Summarize GUI smoke
        if: always()
        shell: bash
        run: |
          {
            echo "## Qt GUI smoke (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-gui" 2>/dev/null || echo "_No GUI smoke files_"
            echo
            echo "Expected artifact name hint: \`${{ matrix.gui_name }}\` (actual filename uses Qt.platform.os)."
          } >> "$GITHUB_STEP_SUMMARY"

  visual-review:
    name: Post visual review comment
    needs: [core, desktop]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Find previous visual review comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- wallspan-visual-review -->

      - name: Post or update visual review comment
        uses: actions/github-script@v7
        env:
          EXISTING_COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId, per_page: 100 },
            );

            const isVisual = (name) =>
              name.startsWith('apply-payload-') || name.startsWith('gui-smoke-');
            const visual = artifacts
              .filter((a) => !a.expired && isVisual(a.name))
              .sort((a, b) => a.name.localeCompare(b.name));

            if (visual.length === 0) {
              core.info('No visual artifacts to link');
              return;
            }

            const artifactHref = (artifact) =>
              `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;

            const section = (title, prefix) => {
              const items = visual.filter((a) => a.name.startsWith(prefix));
              if (items.length === 0) {
                return '';
              }
              const lines = items.map((a) => {
                const label = a.name.slice(prefix.length);
                return `- [${label}](${artifactHref(a)})`;
              });
              return `### ${title}\n\n${lines.join('\n')}\n\n`;
            };

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const body = [
              '<!-- wallspan-visual-review -->',
              '## Visual review',
              '',
              `From [CI run #${context.runNumber}](${runUrl}).`,
              '',
              section('Apply-payload rasters', 'apply-payload-'),
              section('Qt GUI smoke screenshots', 'gui-smoke-'),
            ].join('\n').trimEnd() + '\n';

            const existingId = process.env.EXISTING_COMMENT_ID;
            if (existingId) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: Number(existingId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.issue.number,
                body,
              });
            }
