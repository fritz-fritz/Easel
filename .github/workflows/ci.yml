name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Path filters keep Qt smoke / multi-OS Rust / gallery producers off docs- and
  # tooling-only diffs. Push and pull_request both use the filter (a docs-only
  # commit on main should not burn three desktop runners either).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      desktop: ${{ steps.filter.outputs.desktop }}
      gallery_tooling: ${{ steps.filter.outputs.gallery_tooling }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'crates/**'
              - 'apps/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
              - '.github/scripts/install-libheif-windows.ps1'
              - '.github/scripts/sync-rust-pins.py'
              - '.github/scripts/test_sync_rust_pins.py'
              - '.github/scripts/check-cxx-gen-align.py'
              - '.github/scripts/test_check_cxx_gen_align.py'
              - '.github/libheif-windows.lock.json'
              - 'tools/easel-deps/**'
            desktop:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/**'
              - 'apps/easel-desktop/**'
              - '.github/actions/ci-visual/**'
              - '.github/actions/setup-rust/**'
              - '.github/workflows/ci.yml'
              - '.github/scripts/install-libheif-windows.ps1'
              - '.github/libheif-windows.lock.json'
              - 'tools/easel-deps/**'
            # Include ci.yml so edits to the Gallery tooling job itself are exercised.
            gallery_tooling:
              - '.github/ci-visual/**'
              - '.github/actions/ci-visual/**'
              - '.github/workflows/ci-visual-gallery.yml'
              - '.github/workflows/ci.yml'

  gallery-tooling:
    name: Gallery tooling
    needs: changes
    if: needs.changes.outputs.gallery_tooling == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Unit-test ci-visual gallery builder
        run: python3 .github/ci-visual/test_build_gallery.py
      - name: Unit-test smoke view selector
        run: python3 .github/ci-visual/test_select_smoke_views.py

  core:
    name: Core (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Bust when Windows libheif install strategy changes.
          prefix-key: easel-deps-libheif-v1.23.1-r2
      - name: Install libheif (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            pkg-config libheif-dev \
            libheif-plugin-libde265 \
            libheif-plugin-aomenc \
            libheif-plugin-x265
      - name: Install libheif (macOS)
        if: runner.os == 'macOS'
        run: brew install libheif pkg-config
      - name: Install libheif (Windows prebuilt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\.github\scripts\install-libheif-windows.ps1
      - name: Check Rust companion pins
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 .github/scripts/test_sync_rust_pins.py
          python3 .github/scripts/sync-rust-pins.py --check
      - name: Check cxx / cxx-gen alignment
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 .github/scripts/test_check_cxx_gen_align.py
          python3 .github/scripts/check-cxx-gen-align.py
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: Test with visual apply-payload artifacts
        env:
          EASEL_VISUAL_OUTDIR: ${{ runner.temp }}/easel-visual
        run: cargo test
      # Public artifacts are deliberately non-installable synthetic review images.
      - name: Publish apply-payload visuals
        if: always()
        uses: ./.github/actions/ci-visual
        with:
          stage: apply-payload
          source-dir: ${{ runner.temp }}/easel-visual
          pattern: "apply-display-*.png"
          name-template: "{stage}-{os}-{stem}.png"
          runner-os: ${{ matrix.os }}
          if-no-files-found: ignore
          summary-title: Apply-payload rasters (${{ matrix.os }})
      - run: cargo clippy --all-targets -- -D warnings

  desktop:
    name: Qt desktop smoke (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Need enough history to diff PR/push commits for selective smoke views.
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Select smoke views from changed paths
        id: smoke_views
        shell: bash
        run: |
          set -euo pipefail
          # Pipe git diff straight into the selector (no mapfile — macOS ships Bash 3).
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          elif command -v python >/dev/null 2>&1; then
            PYTHON=python
          else
            echo "::error::python3/python not found on PATH"
            exit 1
          fi
          before="${{ github.event.before }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            views="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
              | "$PYTHON" .github/ci-visual/select_smoke_views.py)"
          elif [[ -n "${before}" && "${before}" != "0000000000000000000000000000000000000000" ]]; then
            views="$(git diff --name-only "${before}" "${{ github.sha }}" \
              | "$PYTHON" .github/ci-visual/select_smoke_views.py)"
          else
            views="$("$PYTHON" .github/ci-visual/select_smoke_views.py </dev/null)"
          fi
          echo "Selected smoke views: ${views}"
          echo "views=${views}" >> "$GITHUB_OUTPUT"

      - name: Install Qt + libheif (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential clang cmake ninja-build pkg-config g++ \
            libheif-dev libheif-plugin-libde265 \
            libheif-plugin-aomenc libheif-plugin-x265 \
            qt6-base-dev qt6-declarative-dev xvfb \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-dialogs qml6-module-qtqml \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick-templates

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          # Full desktop install already includes Qt Declarative / Quick.
          # Do not pass `qtdeclarative` as `modules` — that is an archive name.
          version: "6.6.3"
          arch: win64_msvc2019_64
          cache: true
          install-deps: "true"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: easel-deps-libheif-v1.23.1-r2

      - name: Install libheif (Windows prebuilt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\.github\scripts\install-libheif-windows.ps1

      - name: Install Qt + libheif (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 libheif pkg-config
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Build desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo build -p easel-desktop

      - name: Build desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build -p easel-desktop

      - name: Clippy desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo clippy -p easel-desktop --all-targets -- -D warnings

      - name: Clippy desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo clippy -p easel-desktop --all-targets -- -D warnings

      - name: Smoke screenshot (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
          QT_QUICK_CONTROLS_STYLE: Fusion
          CXX: g++
          CC: gcc
        run: |
          mkdir -p "${{ runner.temp }}/easel-gui"
          # Fixed virtual screen so the smoke window can lock to 1220×780.
          xvfb-run -a -s "-screen 0 1400x900x24" cargo run -p easel-desktop -- \
            --smoke-screenshot "${{ runner.temp }}/easel-gui" \
            --smoke-views "${{ steps.smoke_views.outputs.views }}"

      - name: Smoke screenshot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/easel-gui" | Out-Null
          cargo run -p easel-desktop -- `
            --smoke-screenshot "${{ runner.temp }}/easel-gui" `
            --smoke-views "${{ steps.smoke_views.outputs.views }}"

      - name: Smoke screenshot (macOS)
        if: runner.os == 'macOS'
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          mkdir -p "${{ runner.temp }}/easel-gui"
          cargo run -p easel-desktop -- \
            --smoke-screenshot "${{ runner.temp }}/easel-gui" \
            --smoke-views "${{ steps.smoke_views.outputs.views }}"

      - name: Publish GUI smoke visuals
        if: always()
        uses: ./.github/actions/ci-visual
        with:
          stage: gui-smoke
          source-dir: ${{ runner.temp }}/easel-gui
          pattern: "gui-*.png"
          name-template: "{stage}-{os}-{stem}.png"
          runner-os: ${{ matrix.os }}
          if-no-files-found: warn
          summary-title: Qt GUI smoke (${{ matrix.os }})

  # Single always-on check for branch protection when matrix jobs are skipped.
  ci:
    name: CI gate
    needs: [changes, gallery-tooling, core, desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          GALLERY_TOOLING: ${{ needs.gallery-tooling.result }}
          CORE: ${{ needs.core.result }}
          DESKTOP: ${{ needs.desktop.result }}
          WANT_RUST: ${{ needs.changes.outputs.rust }}
          WANT_DESKTOP: ${{ needs.changes.outputs.desktop }}
          WANT_GALLERY_TOOLING: ${{ needs.changes.outputs.gallery_tooling }}
        run: |
          set -euo pipefail
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Detect changes failed: $CHANGES_RESULT"
            exit 1
          fi
          check() {
            local want="$1"
            local result="$2"
            local name="$3"
            if [[ "$want" == "true" ]]; then
              if [[ "$result" != "success" ]]; then
                echo "$name required but result=$result"
                exit 1
              fi
              echo "$name ok"
            else
              echo "$name skipped for this diff"
            fi
          }
          check "$WANT_GALLERY_TOOLING" "$GALLERY_TOOLING" "gallery-tooling"
          check "$WANT_RUST" "$CORE" "core"
          check "$WANT_DESKTOP" "$DESKTOP" "desktop"
