name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: Test with visual apply-payload artifacts
        env:
          WALLSPAN_VISUAL_OUTDIR: ${{ runner.temp }}/wallspan-visual
        run: cargo test
      - name: Upload raster visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-payload-${{ matrix.os }}
          path: ${{ runner.temp }}/wallspan-visual/*.png
          if-no-files-found: ignore
      - name: Summarize visual artifacts
        if: always()
        shell: bash
        run: |
          {
            echo "## Apply-payload rasters (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-visual" 2>/dev/null || echo "_No visual files_"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: cargo clippy --all-targets -- -D warnings

  desktop:
    name: Qt desktop smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_name: gui-linux.png
          - os: windows-latest
            gui_name: gui-windows.png
          - os: macos-latest
            gui_name: gui-osx.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential clang cmake ninja-build pkg-config g++ \
            qt6-base-dev qt6-declarative-dev xvfb \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-dialogs qml6-module-qtqml \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick-templates

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          # Full desktop install already includes Qt Declarative / Quick.
          # Do not pass `qtdeclarative` as `modules` — that is an archive name.
          version: "6.6.3"
          arch: win64_msvc2019_64
          cache: true
          install-deps: "true"

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo build -p wallspan-desktop

      - name: Build desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build -p wallspan-desktop

      - name: Clippy desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Clippy desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Smoke screenshot (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
          CXX: g++
          CC: gcc
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          xvfb-run -a cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/wallspan-gui" | Out-Null
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Upload GUI smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-smoke-${{ matrix.os }}
          path: ${{ runner.temp }}/wallspan-gui/*.png
          if-no-files-found: warn

      - name: Summarize GUI smoke
        if: always()
        shell: bash
        run: |
          {
            echo "## Qt GUI smoke (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-gui" 2>/dev/null || echo "_No GUI smoke files_"
            echo
            echo "Expected artifact name hint: \`${{ matrix.gui_name }}\` (actual filename uses Qt.platform.os)."
          } >> "$GITHUB_STEP_SUMMARY"

  visual-review:
    name: Post visual review comment
    needs: [core, desktop]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download raster artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: apply-payload-*
          path: visuals/raster
          merge-multiple: false

      - name: Download GUI smoke artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: gui-smoke-*
          path: visuals/gui
          merge-multiple: false

      - name: Stage publish tree
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          publish="publish/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}"
          mkdir -p "$publish/raster" "$publish/gui"
          shopt -s nullglob
          for dir in visuals/raster/apply-payload-*; do
            os="$(basename "$dir" | sed 's/^apply-payload-//')"
            mkdir -p "$publish/raster/$os"
            cp -a "$dir"/*.png "$publish/raster/$os/" 2>/dev/null || true
          done
          for dir in visuals/gui/gui-smoke-*; do
            os="$(basename "$dir" | sed 's/^gui-smoke-//')"
            mkdir -p "$publish/gui/$os"
            cp -a "$dir"/*.png "$publish/gui/$os/" 2>/dev/null || true
          done
          mapfile -t pngs < <(find "$publish" -name '*.png' | sort)
          if ((${#pngs[@]} == 0)); then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "No PNG visuals found to publish." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "has_images=true" >> "$GITHUB_OUTPUT"
          echo "publish_dir=$publish" >> "$GITHUB_OUTPUT"
          echo "base_url=https://raw.githubusercontent.com/${{ github.repository }}/ci-visuals/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Publish visuals to ci-visuals branch
        if: steps.stage.outputs.has_images == 'true'
        shell: bash
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          run_id="${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ci-visuals || true
          worktree="$(mktemp -d)"
          if git show-ref --verify --quiet refs/remotes/origin/ci-visuals; then
            git worktree add -B ci-visuals "$worktree" origin/ci-visuals
          else
            git worktree add --detach "$worktree"
            git -C "$worktree" checkout --orphan ci-visuals
            git -C "$worktree" rm -rf . >/dev/null 2>&1 || true
            git -C "$worktree" commit --allow-empty -m "Initialize ci-visuals branch"
          fi
          dest="$worktree/pr-$pr/$run_id"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -a "${{ steps.stage.outputs.publish_dir }}/." "$dest/"
          git -C "$worktree" add "pr-$pr/$run_id"
          git -C "$worktree" commit -m "Visual artifacts for PR #$pr run $run_id"
          git -C "$worktree" push origin HEAD:ci-visuals
          git worktree remove --force "$worktree"

      - name: Render comment body
        if: steps.stage.outputs.has_images == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.stage.outputs.base_url }}"
          {
            echo "<!-- wallspan-visual-review -->"
            echo "## Visual review (CI)"
            echo
            echo "Posted by \`github-actions[bot]\` from workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            echo
            echo "Images are hosted on \`raw.githubusercontent.com\` from the \`ci-visuals\` branch."
            echo
            echo "### Apply-payload rasters"
            for os_dir in publish/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}/raster/*; do
              [[ -d "$os_dir" ]] || continue
              os="$(basename "$os_dir")"
              echo "#### ${os}"
              for img in "$os_dir"/*.png; do
                [[ -f "$img" ]] || continue
                name="$(basename "$img")"
                echo "![${os}/${name}](${base}/raster/${os}/${name})"
              done
              echo
            done
            echo "### Qt GUI smoke screenshots"
            for os_dir in publish/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}/gui/*; do
              [[ -d "$os_dir" ]] || continue
              os="$(basename "$os_dir")"
              echo "#### ${os}"
              for img in "$os_dir"/*.png; do
                [[ -f "$img" ]] || continue
                name="$(basename "$img")"
                echo "![${os}/${name}](${base}/gui/${os}/${name})"
              done
              echo
            done
          } > visuals/comment.md

      - name: Find previous visual review comment
        if: steps.stage.outputs.has_images == 'true'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- wallspan-visual-review -->

      - name: Post or update visual review comment
        if: steps.stage.outputs.has_images == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body-path: visuals/comment.md
