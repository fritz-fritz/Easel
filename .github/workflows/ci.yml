name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: Test with visual apply-payload artifacts
        env:
          EASEL_VISUAL_OUTDIR: ${{ runner.temp }}/easel-visual
        run: cargo test
      - name: Stage individual apply-payload PNGs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          src="${{ runner.temp }}/easel-visual"
          out="${{ runner.temp }}/easel-visual-named"
          mkdir -p "$out"
          for i in 0 1 2; do
            if [[ -f "$src/apply-display-$i.png" ]]; then
              cp "$src/apply-display-$i.png" \
                "$out/apply-payload-${{ matrix.os }}-display-$i.png"
            fi
          done
          ls -la "$out" 2>/dev/null || true
      # Public artifacts are deliberately non-installable synthetic review images.
      - name: Upload apply-payload display 0
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/easel-visual-named/apply-payload-${{ matrix.os }}-display-0.png
          archive: false
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload apply-payload display 1
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/easel-visual-named/apply-payload-${{ matrix.os }}-display-1.png
          archive: false
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload apply-payload display 2
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/easel-visual-named/apply-payload-${{ matrix.os }}-display-2.png
          archive: false
          retention-days: 7
          if-no-files-found: ignore
      - name: Summarize visual artifacts
        if: always()
        shell: bash
        run: |
          {
            echo "## Apply-payload rasters (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/easel-visual-named" 2>/dev/null || echo "_No visual files_"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: cargo clippy --all-targets -- -D warnings

  desktop:
    name: Qt desktop smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_name: gui-linux.png
          - os: windows-latest
            gui_name: gui-windows.png
          - os: macos-latest
            gui_name: gui-osx.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential clang cmake ninja-build pkg-config g++ \
            qt6-base-dev qt6-declarative-dev xvfb \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-dialogs qml6-module-qtqml \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick-templates

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          # Full desktop install already includes Qt Declarative / Quick.
          # Do not pass `qtdeclarative` as `modules` — that is an archive name.
          version: "6.6.3"
          arch: win64_msvc2019_64
          cache: true
          install-deps: "true"

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo build -p easel-desktop

      - name: Build desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build -p easel-desktop

      - name: Clippy desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo clippy -p easel-desktop --all-targets -- -D warnings

      - name: Clippy desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo clippy -p easel-desktop --all-targets -- -D warnings

      - name: Smoke screenshot (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
          QT_QUICK_CONTROLS_STYLE: Fusion
          CXX: g++
          CC: gcc
        run: |
          mkdir -p "${{ runner.temp }}/easel-gui"
          xvfb-run -a cargo run -p easel-desktop -- --smoke-screenshot "${{ runner.temp }}/easel-gui"

      - name: Smoke screenshot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/easel-gui" | Out-Null
          cargo run -p easel-desktop -- --smoke-screenshot "${{ runner.temp }}/easel-gui"

      - name: Smoke screenshot (macOS)
        if: runner.os == 'macOS'
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          mkdir -p "${{ runner.temp }}/easel-gui"
          cargo run -p easel-desktop -- --smoke-screenshot "${{ runner.temp }}/easel-gui"

      - name: Stage GUI smoke PNG
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          gui="${{ runner.temp }}/easel-gui"
          shopt -s nullglob
          files=("$gui"/gui-*.png)
          if ((${#files[@]} == 0)); then
            echo "No GUI smoke PNG found"
            exit 0
          fi
          cp "${files[0]}" "$gui/gui-smoke-${{ matrix.os }}.png"
          ls -la "$gui/gui-smoke-${{ matrix.os }}.png"

      - name: Upload GUI smoke screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/easel-gui/gui-smoke-${{ matrix.os }}.png
          archive: false
          retention-days: 7
          if-no-files-found: warn

      - name: Summarize GUI smoke
        if: always()
        shell: bash
        run: |
          {
            echo "## Qt GUI smoke (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/easel-gui" 2>/dev/null || echo "_No GUI smoke files_"
            echo
            echo "Expected upload name: \`gui-smoke-${{ matrix.os }}.png\` (capture used Qt.platform.os)."
          } >> "$GITHUB_STEP_SUMMARY"

