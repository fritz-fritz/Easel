name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: Test with visual apply-payload artifacts
        env:
          WALLSPAN_VISUAL_OUTDIR: ${{ runner.temp }}/wallspan-visual
        run: cargo test
      - name: Stage individual apply-payload PNGs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          src="${{ runner.temp }}/wallspan-visual"
          out="${{ runner.temp }}/wallspan-visual-named"
          mkdir -p "$out"
          for i in 0 1 2; do
            if [[ -f "$src/apply-display-$i.png" ]]; then
              cp "$src/apply-display-$i.png" \
                "$out/apply-payload-${{ matrix.os }}-display-$i.png"
            fi
          done
          ls -la "$out" 2>/dev/null || true
      - name: Upload apply-payload display 0
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/wallspan-visual-named/apply-payload-${{ matrix.os }}-display-0.png
          archive: false
          if-no-files-found: ignore
      - name: Upload apply-payload display 1
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/wallspan-visual-named/apply-payload-${{ matrix.os }}-display-1.png
          archive: false
          if-no-files-found: ignore
      - name: Upload apply-payload display 2
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/wallspan-visual-named/apply-payload-${{ matrix.os }}-display-2.png
          archive: false
          if-no-files-found: ignore
      - name: Summarize visual artifacts
        if: always()
        shell: bash
        run: |
          {
            echo "## Apply-payload rasters (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-visual-named" 2>/dev/null || echo "_No visual files_"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: cargo clippy --all-targets -- -D warnings

  desktop:
    name: Qt desktop smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gui_name: gui-linux.png
          - os: windows-latest
            gui_name: gui-windows.png
          - os: macos-latest
            gui_name: gui-osx.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential clang cmake ninja-build pkg-config g++ \
            qt6-base-dev qt6-declarative-dev xvfb \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtquick-dialogs qml6-module-qtqml \
            qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick-templates

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          # Full desktop install already includes Qt Declarative / Quick.
          # Do not pass `qtdeclarative` as `modules` — that is an archive name.
          version: "6.6.3"
          arch: win64_msvc2019_64
          cache: true
          install-deps: "true"

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo build -p wallspan-desktop

      - name: Build desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build -p wallspan-desktop

      - name: Clippy desktop (Linux)
        if: runner.os == 'Linux'
        env:
          CXX: g++
          CC: gcc
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Clippy desktop (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo clippy -p wallspan-desktop --all-targets -- -D warnings

      - name: Smoke screenshot (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: xcb
          QT_QUICK_CONTROLS_STYLE: Fusion
          CXX: g++
          CC: gcc
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          xvfb-run -a cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}/wallspan-gui" | Out-Null
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Smoke screenshot (macOS)
        if: runner.os == 'macOS'
        env:
          QT_QUICK_CONTROLS_STYLE: Fusion
        run: |
          mkdir -p "${{ runner.temp }}/wallspan-gui"
          cargo run -p wallspan-desktop -- --smoke-screenshot "${{ runner.temp }}/wallspan-gui"

      - name: Stage GUI smoke PNG
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          gui="${{ runner.temp }}/wallspan-gui"
          shopt -s nullglob
          files=("$gui"/gui-*.png)
          if ((${#files[@]} == 0)); then
            echo "No GUI smoke PNG found"
            exit 0
          fi
          cp "${files[0]}" "$gui/gui-smoke-${{ matrix.os }}.png"
          ls -la "$gui/gui-smoke-${{ matrix.os }}.png"

      - name: Upload GUI smoke screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/wallspan-gui/gui-smoke-${{ matrix.os }}.png
          archive: false
          if-no-files-found: warn

      - name: Summarize GUI smoke
        if: always()
        shell: bash
        run: |
          {
            echo "## Qt GUI smoke (${{ matrix.os }})"
            echo
            ls -la "${{ runner.temp }}/wallspan-gui" 2>/dev/null || echo "_No GUI smoke files_"
            echo
            echo "Expected upload name: \`gui-smoke-${{ matrix.os }}.png\` (capture used Qt.platform.os)."
          } >> "$GITHUB_STEP_SUMMARY"

  visual-review:
    name: Post visual review comment
    needs: [core, desktop]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download apply-payload artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: apply-payload-*
          path: visuals
          merge-multiple: true

      - name: Download GUI smoke artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: gui-smoke-*
          path: visuals
          merge-multiple: true

      - name: Find previous visual review comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- wallspan-visual-review -->

      - name: Post or update visual review comment
        uses: actions/github-script@v7
        env:
          EXISTING_COMMENT_ID: ${{ steps.find-comment.outputs.comment-id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const token = process.env.GITHUB_TOKEN;

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId, per_page: 100 },
            );

            const byName = new Map(
              artifacts.filter((a) => !a.expired).map((a) => [a.name, a]),
            );

            function pngDimensions(filePath) {
              const buf = fs.readFileSync(filePath);
              if (buf.length < 24 || buf.toString('ascii', 1, 4) !== 'PNG') {
                return 'unknown';
              }
              const width = buf.readUInt32BE(16);
              const height = buf.readUInt32BE(20);
              return `${width}×${height}`;
            }

            function describe(name) {
              const apply = name.match(/^apply-payload-(.+)-display-(\d+)\.png$/);
              if (apply) {
                return {
                  kind: 'Apply payload',
                  platform: apply[1],
                  meaning: `Per-display wallpaper raster for fixture display ${apply[2]} (what Apply hands to the wallpaper backend)`,
                };
              }
              const gui = name.match(/^gui-smoke-(.+)\.png$/);
              if (gui) {
                return {
                  kind: 'GUI smoke',
                  platform: gui[1],
                  meaning: 'Qt Compose monitor-preview capture after loading the smoke fixture',
                };
              }
              return {
                kind: 'Visual',
                platform: '—',
                meaning: name,
              };
            }

            function artifactPageUrl(artifact) {
              return `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
            }

            // github.com/.../artifacts/{id} is session-auth only and returns 404 to
            // GitHub's camo proxy, so markdown ![img](that-url) never renders.
            // Resolve to the short-lived Azure signed download URL instead: it serves
            // image/png anonymously so camo can fetch it. Warm camo immediately so
            // the proxy keeps a cached copy after the SAS token expires (~10 min).
            async function signedImageUrl(artifactId) {
              const res = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/actions/artifacts/${artifactId}/zip`,
                {
                  headers: {
                    Authorization: `Bearer ${token}`,
                    Accept: 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                  },
                  redirect: 'manual',
                },
              );
              if (res.status !== 302 && res.status !== 301) {
                throw new Error(
                  `artifact ${artifactId}: expected redirect, got HTTP ${res.status}`,
                );
              }
              const location = res.headers.get('location');
              if (!location) {
                throw new Error(`artifact ${artifactId}: missing Location header`);
              }
              return location;
            }

            async function warmCamo(imageUrl) {
              const html = await github.rest.markdown.render({
                text: `![warm](${imageUrl})`,
                mode: 'gfm',
                context: `${owner}/${repo}`,
              });
              const match = String(html.data).match(
                /src="(https:\/\/camo\.githubusercontent\.com\/[^"]+)"/,
              );
              if (!match) {
                core.warning(`camo URL not found while warming ${imageUrl.slice(0, 80)}…`);
                return;
              }
              const camoRes = await fetch(match[1]);
              if (!camoRes.ok) {
                core.warning(`camo warm failed (${camoRes.status}) for ${match[1].slice(0, 80)}…`);
              }
            }

            const visualDir = 'visuals';
            let files = [];
            if (fs.existsSync(visualDir)) {
              files = fs.readdirSync(visualDir)
                .filter((name) => name.endsWith('.png'))
                .sort();
            }

            if (files.length === 0) {
              core.info('No visual PNG artifacts downloaded');
              return;
            }

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const rows = [];
            for (const name of files) {
              const meta = describe(name);
              const dims = pngDimensions(path.join(visualDir, name));
              const artifact = byName.get(name);
              if (!artifact) {
                rows.push(
                  `| _missing_ | \`${name}\` | ${meta.kind} | ${meta.platform} | ${meta.meaning} | ${dims} |`,
                );
                continue;
              }
              const pageHref = artifactPageUrl(artifact);
              let preview = `_unavailable_`;
              try {
                const imageHref = await signedImageUrl(artifact.id);
                await warmCamo(imageHref);
                preview = `![${name}](${imageHref})`;
              } catch (error) {
                core.warning(`preview URL for ${name}: ${error.message}`);
              }
              const link = `[\`${name}\`](${pageHref})`;
              rows.push(
                `| ${preview} | ${link} | ${meta.kind} | ${meta.platform} | ${meta.meaning} | ${dims} |`,
              );
            }

            const body = [
              '<!-- wallspan-visual-review -->',
              '## Visual review',
              '',
              `From [CI run #${context.runNumber}](${runUrl}).`,
              '',
              '| Preview | File | Kind | Platform | Meaning | Dimensions |',
              '| --- | --- | --- | --- | --- | --- |',
              ...rows,
              '',
            ].join('\n');

            const existingId = process.env.EXISTING_COMMENT_ID;
            if (existingId) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: Number(existingId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.issue.number,
                body,
              });
            }
