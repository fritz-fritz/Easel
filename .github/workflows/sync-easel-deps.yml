name: Sync easel-deps pin

# Keep .github/libheif-windows.lock.json aligned with fritz-fritz/easel-deps
# GitHub Releases. Only accepts a release that publishes a `*.zip.sha256`
# sidecar (API digests alone are not enough — the first 1.23.1 cut had a
# digest but the wrong port) and whose tag matches libheif-vX.Y.Z[-rN].
# Opens a PR when the pin should move.

on:
  workflow_dispatch:
  schedule:
    - cron: "42 7 * * *"
  repository_dispatch:
    types: [easel-deps-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Probe easel-deps latest libheif release
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/sync-easel-deps-pin.py \
            --lock .github/libheif-windows.lock.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.probe.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="sync/easel-deps-${{ steps.probe.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .github/libheif-windows.lock.json .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "chore: pin Windows libheif to ${{ steps.probe.outputs.tag }}"
          git push -u origin "$BRANCH" --force
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "chore: pin Windows libheif to ${{ steps.probe.outputs.tag }}" --body-file pr-body.md
          else
            gh pr create --title "chore: pin Windows libheif to ${{ steps.probe.outputs.tag }}" \
              --body-file pr-body.md --base main --head "$BRANCH"
          fi
