name: Setup Rust
description: Install the Rust toolchain pinned in rust-toolchain.toml

inputs:
  components:
    description: Comma-separated rustup components (e.g. rustfmt, clippy)
    required: false
    default: ""

outputs:
  channel:
    description: Channel parsed from rust-toolchain.toml
    value: ${{ steps.pin.outputs.channel }}

runs:
  using: composite
  steps:
    - id: pin
      shell: bash
      run: |
        set -euo pipefail
        channel="$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)"/\1/p' rust-toolchain.toml | head -n 1)"
        if [[ -z "$channel" ]]; then
          echo "::error::could not parse channel from rust-toolchain.toml"
          exit 1
        fi
        echo "channel=$channel" >> "$GITHUB_OUTPUT"
        echo "Using rust-toolchain.toml channel=$channel"

    # Action revision is the installer; the compiler version comes from the pin.
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.pin.outputs.channel }}
        components: ${{ inputs.components }}
