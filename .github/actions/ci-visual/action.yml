name: ci-visual
description: >
  Stage, rename, and upload harness visual PNGs as non-archived artifacts,
  emit a JSON manifest, and append a step-summary section.

inputs:
  stage:
    description: Logical harness stage id (e.g. apply-payload, gui-smoke)
    required: true
  source-dir:
    description: Directory where producers wrote visual files
    required: true
  pattern:
    description: Glob of files to publish relative to source-dir (e.g. apply-display-*.png)
    required: true
  name-template:
    description: >
      Rename pattern with placeholders {stage}, {os}, {stem}
      (stem is the source filename without extension)
    required: true
  runner-os:
    description: Matrix OS label for stable artifact names
    required: true
  retention-days:
    description: Artifact retention in days
    required: false
    default: "7"
  if-no-files-found:
    description: ignore | warn | error when no files match
    required: false
    default: ignore
  summary-title:
    description: Heading for the GitHub step summary section
    required: false
    default: ""

outputs:
  count:
    description: Number of staged visual files
    value: ${{ steps.stage.outputs.count }}
  staged-dir:
    description: Directory containing staged files
    value: ${{ steps.stage.outputs.staged-dir }}

runs:
  using: composite
  steps:
    - name: Stage visual artifacts
      id: stage
      shell: bash
      env:
        INPUT_STAGE: ${{ inputs.stage }}
        INPUT_SOURCE_DIR: ${{ inputs.source-dir }}
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_NAME_TEMPLATE: ${{ inputs.name-template }}
        INPUT_RUNNER_OS: ${{ inputs.runner-os }}
        INPUT_IF_NO_FILES: ${{ inputs.if-no-files-found }}
        INPUT_SUMMARY_TITLE: ${{ inputs.summary-title }}
      run: bash "${{ github.action_path }}/stage.sh"

    # upload-artifact must be a real `uses:` step so ACTIONS_RUNTIME_TOKEN is available.
    # archive:false accepts a single file per step; support up to 12 staged PNGs.
    - name: Upload visual file 0
      id: up0
      if: steps.stage.outputs.file_0 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_0 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 1
      id: up1
      if: steps.stage.outputs.file_1 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_1 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 2
      id: up2
      if: steps.stage.outputs.file_2 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_2 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 3
      id: up3
      if: steps.stage.outputs.file_3 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_3 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 4
      id: up4
      if: steps.stage.outputs.file_4 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_4 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 5
      id: up5
      if: steps.stage.outputs.file_5 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_5 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 6
      id: up6
      if: steps.stage.outputs.file_6 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_6 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 7
      id: up7
      if: steps.stage.outputs.file_7 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_7 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 8
      id: up8
      if: steps.stage.outputs.file_8 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_8 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 9
      id: up9
      if: steps.stage.outputs.file_9 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_9 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 10
      id: up10
      if: steps.stage.outputs.file_10 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_10 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Upload visual file 11
      id: up11
      if: steps.stage.outputs.file_11 != ''
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.stage.outputs.file_11 }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Write and upload manifest
      if: steps.stage.outputs.count != '0'
      id: manifest
      shell: bash
      env:
        STAGED_DIR: ${{ steps.stage.outputs.staged-dir }}
        INPUT_STAGE: ${{ inputs.stage }}
        INPUT_RUNNER_OS: ${{ inputs.runner-os }}
        FILE_COUNT: ${{ steps.stage.outputs.count }}
        UP0_ID: ${{ steps.up0.outputs.artifact-id }}
        UP0_URL: ${{ steps.up0.outputs.artifact-url }}
        UP1_ID: ${{ steps.up1.outputs.artifact-id }}
        UP1_URL: ${{ steps.up1.outputs.artifact-url }}
        UP2_ID: ${{ steps.up2.outputs.artifact-id }}
        UP2_URL: ${{ steps.up2.outputs.artifact-url }}
        UP3_ID: ${{ steps.up3.outputs.artifact-id }}
        UP3_URL: ${{ steps.up3.outputs.artifact-url }}
        UP4_ID: ${{ steps.up4.outputs.artifact-id }}
        UP4_URL: ${{ steps.up4.outputs.artifact-url }}
        UP5_ID: ${{ steps.up5.outputs.artifact-id }}
        UP5_URL: ${{ steps.up5.outputs.artifact-url }}
        UP6_ID: ${{ steps.up6.outputs.artifact-id }}
        UP6_URL: ${{ steps.up6.outputs.artifact-url }}
        UP7_ID: ${{ steps.up7.outputs.artifact-id }}
        UP7_URL: ${{ steps.up7.outputs.artifact-url }}
        UP8_ID: ${{ steps.up8.outputs.artifact-id }}
        UP8_URL: ${{ steps.up8.outputs.artifact-url }}
        UP9_ID: ${{ steps.up9.outputs.artifact-id }}
        UP9_URL: ${{ steps.up9.outputs.artifact-url }}
        UP10_ID: ${{ steps.up10.outputs.artifact-id }}
        UP10_URL: ${{ steps.up10.outputs.artifact-url }}
        UP11_ID: ${{ steps.up11.outputs.artifact-id }}
        UP11_URL: ${{ steps.up11.outputs.artifact-url }}
      run: bash "${{ github.action_path }}/write-manifest.sh"

    - name: Upload manifest
      if: steps.stage.outputs.count != '0'
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.manifest.outputs.manifest-path }}
        archive: false
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Summarize visual artifacts
      if: always()
      shell: bash
      env:
        STAGED_DIR: ${{ steps.stage.outputs.staged-dir }}
        SUMMARY_TITLE: ${{ steps.stage.outputs.summary-title }}
        FILE_COUNT: ${{ steps.stage.outputs.count }}
      run: |
        set -euo pipefail
        {
          echo "## ${SUMMARY_TITLE}"
          echo
          if [[ "${FILE_COUNT:-0}" == "0" || ! -d "${STAGED_DIR:-}" ]]; then
            echo "_No visual files_"
          else
            ls -la "$STAGED_DIR"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
