name: ci-visual
description: >
  Stage, rename, and upload harness visual PNGs as one zip artifact per
  stage×OS (manifest included), and append a step-summary section.

inputs:
  stage:
    description: Logical harness stage id (e.g. apply-payload, gui-smoke)
    required: true
  source-dir:
    description: Directory where producers wrote visual files
    required: true
  pattern:
    description: >
      Glob of files to publish relative to source-dir (e.g. apply-display-*.png).
      Staged files are uploaded together in one zip (no per-file archive:false cap).
      A soft warning fires above 64 matches; the step errors above 256.
    required: true
  name-template:
    description: >
      Rename pattern with placeholders {stage}, {os}, {stem}
      (stem is the source filename without extension)
    required: true
  runner-os:
    description: Matrix OS label for stable artifact names
    required: true
  retention-days:
    description: Artifact retention in days
    required: false
    default: "7"
  if-no-files-found:
    description: ignore | warn | error when no files match
    required: false
    default: ignore
  summary-title:
    description: Heading for the GitHub step summary section
    required: false
    default: ""

outputs:
  count:
    description: Number of staged visual files
    value: ${{ steps.stage.outputs.count }}
  staged-dir:
    description: Directory containing staged files
    value: ${{ steps.stage.outputs.staged-dir }}
  bundle-name:
    description: Upload artifact name for this stage×OS zip
    value: ${{ steps.stage.outputs.bundle-name }}

runs:
  using: composite
  steps:
    - name: Stage visual artifacts
      id: stage
      shell: bash
      env:
        INPUT_STAGE: ${{ inputs.stage }}
        INPUT_SOURCE_DIR: ${{ inputs.source-dir }}
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_NAME_TEMPLATE: ${{ inputs.name-template }}
        INPUT_RUNNER_OS: ${{ inputs.runner-os }}
        INPUT_IF_NO_FILES: ${{ inputs.if-no-files-found }}
        INPUT_SUMMARY_TITLE: ${{ inputs.summary-title }}
      run: bash "${{ github.action_path }}/stage.sh"

    - name: Write manifest
      if: steps.stage.outputs.count != '0'
      id: manifest
      shell: bash
      env:
        STAGED_DIR: ${{ steps.stage.outputs.staged-dir }}
        INPUT_STAGE: ${{ inputs.stage }}
        INPUT_RUNNER_OS: ${{ inputs.runner-os }}
        FILE_COUNT: ${{ steps.stage.outputs.count }}
        BUNDLE_NAME: ${{ steps.stage.outputs.bundle-name }}
      run: bash "${{ github.action_path }}/write-manifest.sh"

    # One zip per stage×OS (default upload-artifact archiving). Gallery downloads
    # and unpacks these bundles — no per-file archive:false / 12-step limit.
    - name: Upload visual bundle
      if: steps.stage.outputs.count != '0'
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.stage.outputs.bundle-name }}
        path: ${{ steps.stage.outputs.staged-dir }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: error

    - name: Summarize visual artifacts
      if: always()
      shell: bash
      env:
        STAGED_DIR: ${{ steps.stage.outputs.staged-dir }}
        SUMMARY_TITLE: ${{ steps.stage.outputs.summary-title }}
        FILE_COUNT: ${{ steps.stage.outputs.count }}
        BUNDLE_NAME: ${{ steps.stage.outputs.bundle-name }}
      run: |
        set -euo pipefail
        {
          echo "## ${SUMMARY_TITLE}"
          echo
          if [[ "${FILE_COUNT:-0}" == "0" || ! -d "${STAGED_DIR:-}" ]]; then
            echo "_No visual files_"
          else
            echo "Bundle \`${BUNDLE_NAME}\` (${FILE_COUNT} file(s))"
            echo
            ls -la "$STAGED_DIR"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
