version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Compiler pin in rust-toolchain.toml (SSOT). Companion pins in Cargo.toml
  # (rust-version) and AGENTS.md are rewritten onto the same PR by
  # .github/workflows/sync-rust-pins.yml. CI installs via
  # .github/actions/setup-rust (no duplicate version tag in workflows).
  - package-ecosystem: rust-toolchain
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
